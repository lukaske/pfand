[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200
via_ir = true
gas_reports = ["RebateEscrow", "ReputationRegistry", "IdentityRegistry"]
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
